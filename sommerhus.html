<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grærup · Sommerhuset</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --warm:#ff9d3c; --warm-glow:rgba(255,157,60,.55); --warm-soft:rgba(255,157,60,.13);
  --cool:#49b6ff; --cool-glow:rgba(73,182,255,.5);  --cool-soft:rgba(73,182,255,.12);
  --hot:#ff6a48;
  --open:#ffd24a; --shut:#5dcaa5;
  --win:#ffd789;
  --txt:#eef1fb; --muted:#8b93b4; --faint:#5a6388;
  --line:rgba(255,255,255,.07);
  --accent:var(--warm); --accent-glow:var(--warm-glow); --accent-soft:var(--warm-soft);
}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  font-family:'Space Grotesk',system-ui,sans-serif; color:var(--txt);
  background:#05060d; min-height:100vh; overflow-x:hidden;
}
.sky{position:fixed;inset:0;z-index:0;transition:background 2s ease;
  background:
    radial-gradient(900px 700px at 50% -8%,var(--accent-soft),transparent 60%),
    radial-gradient(700px 600px at 12% 8%,#16204a 0%,transparent 55%),
    radial-gradient(800px 700px at 92% 100%,#241433 0%,transparent 55%),
    linear-gradient(180deg,#070912,#04050b 72%)}
/* tidspunkt på dagen — styret af solens højde */
body[data-phase="day"] .sky{background:
    radial-gradient(900px 700px at 50% 6%,rgba(130,190,255,.28),transparent 60%),
    linear-gradient(180deg,#163a63,#2d5d8f 72%,#427aa8)}
body[data-phase="golden"] .sky{background:
    radial-gradient(800px 560px at 50% 104%,rgba(255,150,70,.5),transparent 62%),
    linear-gradient(180deg,#1a2f5e,#3b3a6f 52%,#8a4a2c)}
body[data-phase="twilight"] .sky{background:
    radial-gradient(800px 520px at 50% 104%,rgba(180,120,255,.32),transparent 62%),
    linear-gradient(180deg,#0b1030,#241a4a 68%,#3a2a5e)}
body[data-phase="day"] .stars{opacity:0}
body[data-phase="golden"] .stars{opacity:.18}
body[data-phase="twilight"] .stars{opacity:.5}
.stars{position:fixed;inset:0;z-index:0;opacity:.6;transition:opacity 2s ease;
  background-image:radial-gradient(1.4px 1.4px at 20% 30%,#fff,transparent),
    radial-gradient(1.2px 1.2px at 75% 18%,#cbd5ff,transparent),
    radial-gradient(1px 1px at 45% 72%,#fff,transparent),
    radial-gradient(1.5px 1.5px at 88% 60%,#bcd,transparent),
    radial-gradient(1px 1px at 62% 42%,#fff,transparent),
    radial-gradient(1.1px 1.1px at 33% 88%,#dde,transparent);
  animation:twinkle 6s ease-in-out infinite alternate}
@keyframes twinkle{from{opacity:.35}to{opacity:.7}}

.app{position:relative;z-index:1;max-width:760px;margin:0 auto;padding:30px 22px 56px;
  min-height:100vh;display:flex;flex-direction:column}

.head{text-align:center;margin-bottom:0}
.title{font-family:'Instrument Serif',serif;font-weight:400;line-height:.9;
  font-size:clamp(3.2rem,14vw,5rem);letter-spacing:.01em;
  background:linear-gradient(180deg,#ffffff,#cfd6f5);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.tagline{margin-top:7px;font-weight:600;text-transform:uppercase;letter-spacing:.3em;
  font-size:.74rem;color:#eab35c}
.tagline::before,.tagline::after{content:"";display:inline-block;width:16px;height:1px;
  background:linear-gradient(90deg,transparent,#eab35c);vertical-align:middle;margin:0 11px}
.tagline::after{transform:scaleX(-1)}

.hero{display:flex;flex-direction:column;align-items:center;text-align:center;padding:4px 0 2px}

/* ---- scene ---- */
.stage{position:relative;width:300px;height:236px;margin:6px 0 2px;overflow:hidden;border-radius:26px}
@media(max-width:480px){.stage{width:264px;height:212px}}
.halo{position:absolute;left:50%;top:54%;width:240px;height:240px;margin:-120px 0 0 -120px;border-radius:50%;
  background:radial-gradient(circle,var(--accent-glow),transparent 66%);
  filter:blur(8px);opacity:.5;animation:breathe 5s ease-in-out infinite;z-index:0}
@keyframes breathe{0%,100%{transform:scale(.82);opacity:.4}50%{transform:scale(1.04);opacity:.7}}
.house{position:relative;width:100%;height:100%;z-index:2;
  filter:drop-shadow(0 14px 22px rgba(0,0,0,.45))}
.house .win{fill:var(--win)}
.win-on{animation:winflicker 7s ease-in-out infinite}
@keyframes winflicker{0%,100%{opacity:1}48%{opacity:.92}52%{opacity:.86}56%{opacity:.95}}
.doorGroup{transform-box:fill-box;transform-origin:left center;transition:transform 1.1s cubic-bezier(.5,.05,.3,1)}
.door-open .doorGroup{transform:perspective(260px) rotateY(-62deg)}
.doorlight{opacity:0;transition:opacity 1s ease .25s}
.door-open .doorlight{opacity:1}
.smoke{opacity:0}
.warm .smoke,.mild .smoke{opacity:1}
.smoke circle{animation:rise 5.5s ease-in infinite}
.smoke circle:nth-child(2){animation-delay:1.8s}
.smoke circle:nth-child(3){animation-delay:3.6s}
@keyframes rise{0%{transform:translateY(0) scale(.6);opacity:0}20%{opacity:.5}100%{transform:translateY(-46px) translateX(-10px) scale(1.5);opacity:0}}
.grass{transform-box:fill-box;transform-origin:bottom center;animation:sway 4s ease-in-out infinite}
.grass.g2{animation-delay:.6s}.grass.g3{animation-delay:1.2s}.grass.g4{animation-delay:.3s}
.windy .grass{animation-duration:1.3s}
@keyframes sway{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(5deg)}}

/* sun */
.sun{position:absolute;top:20px;right:30px;width:54px;height:54px;z-index:1;opacity:0;transition:opacity 1s}
.sunny .sun,.clear .sun,.partly .sun{opacity:1}
.sun .disc{fill:#ffd35e}
.sun .rays{transform-box:fill-box;transform-origin:center;animation:spin 26s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.moon{position:absolute;top:22px;right:34px;width:42px;height:42px;z-index:1;opacity:0;transition:opacity 1s}
.night .moon{opacity:1}

/* clouds */
.cloud{position:absolute;z-index:3;opacity:0;color:#cfd8ee}
.cloudy .cloud,.partly .cloud,.rain .cloud,.snow .cloud,.storm .cloud,.fog .cloud{opacity:.9}
.cloud.c1{top:26px;left:-70px;width:78px;animation:drift 24s linear infinite}
.cloud.c2{top:54px;left:-120px;width:56px;opacity:.6;animation:drift 34s linear infinite 4s}
@keyframes drift{from{transform:translateX(0)}to{transform:translateX(420px)}}

/* particles (rain / snow) */
.weatherfx{position:absolute;inset:0;z-index:4;pointer-events:none;overflow:hidden}
.drop{position:absolute;top:-12px;width:2px;height:13px;border-radius:2px;
  background:linear-gradient(180deg,transparent,#9ec9ff);opacity:.0}
.rain .drop{animation:fall linear infinite}
@keyframes fall{0%{transform:translateY(-14px);opacity:0}10%{opacity:.8}100%{transform:translateY(250px);opacity:.2}}
.flake{position:absolute;top:-12px;color:#eaf2ff;opacity:0;font-size:13px;line-height:1}
.snow .flake{animation:flfall linear infinite}
@keyframes flfall{0%{transform:translateY(-14px) translateX(0) rotate(0);opacity:0}10%{opacity:.95}100%{transform:translateY(248px) translateX(22px) rotate(220deg);opacity:.3}}
.flash{position:absolute;inset:0;z-index:5;background:radial-gradient(circle at 60% 30%,rgba(255,255,255,.9),transparent 55%);opacity:0;pointer-events:none}
.storm .flash{animation:flash 6s linear infinite}
@keyframes flash{0%,92%,100%{opacity:0}93%{opacity:.85}95%{opacity:.1}96%{opacity:.7}98%{opacity:0}}
.fogband{position:absolute;left:-20%;right:-20%;bottom:42px;height:46px;z-index:4;opacity:0;
  background:linear-gradient(180deg,transparent,rgba(207,216,238,.45),transparent);filter:blur(3px)}
.fog .fogband{opacity:1;animation:fogmove 9s ease-in-out infinite alternate}
@keyframes fogmove{from{transform:translateX(-14px)}to{transform:translateX(14px)}}

/* ---- big temperature ---- */
.temp{font-family:'Space Grotesk';font-weight:700;font-size:clamp(3rem,15vw,4.8rem);line-height:.9;
  letter-spacing:-.02em;margin-top:8px;
  background:linear-gradient(180deg,#fff, color-mix(in srgb,var(--accent) 72%,#fff));
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.temp .deg{font-family:'Instrument Serif',serif;font-size:.5em;vertical-align:.42em;margin-left:2px;-webkit-text-fill-color:color-mix(in srgb,var(--accent) 80%,#fff)}
.sub{font-family:'Instrument Serif',serif;font-style:italic;font-size:1.3rem;color:var(--muted);margin-top:8px;min-height:1.3rem}

.timer{margin-top:15px;display:inline-flex;align-items:center;gap:11px;
  padding:10px 18px;border-radius:999px;background:rgba(255,255,255,.04);border:1px solid var(--line)}
.dot{width:9px;height:9px;border-radius:50%;background:var(--shut);box-shadow:0 0 10px var(--shut)}
.door-open .dot{background:var(--open);box-shadow:0 0 12px var(--open)}
.timer b{font-variant-numeric:tabular-nums;font-weight:600;font-size:1.02rem;color:#fff}
.timer small{color:var(--muted);font-size:.8rem}

/* stats */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:26px}
.stat{padding:15px 12px;border:1px solid var(--line);border-radius:18px;background:rgba(255,255,255,.025);text-align:center}
.stat .v{font-size:1.4rem;font-weight:600;font-variant-numeric:tabular-nums}
.stat .l{font-size:.68rem;color:var(--faint);margin-top:5px;letter-spacing:.04em;text-transform:uppercase;font-weight:500}

/* weather forecast */
.fcwrap{margin-top:22px;padding:16px 12px 14px;border:1px solid var(--line);border-radius:22px;
  background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.012))}
.fchead{display:flex;align-items:center;justify-content:space-between;margin:0 6px 12px}
.fchead h3{font-size:.76rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.fcnow{font-size:.8rem;color:var(--muted)}
.fcnow b{color:var(--txt);font-weight:600}
.fcrow{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.fcday{text-align:center;padding:8px 2px;border-radius:14px}
.fcday .d{font-size:.72rem;color:var(--faint);text-transform:uppercase;letter-spacing:.06em}
.fcday svg{width:30px;height:30px;margin:6px auto 4px;display:block}
.fcday .hi{font-size:.92rem;font-weight:600;font-variant-numeric:tabular-nums}
.fcday .lo{font-size:.74rem;color:var(--muted);font-variant-numeric:tabular-nums}
.fcday .pop{font-size:.66rem;color:var(--cool);margin-top:2px}

/* graphs */
.graph-card{margin-top:18px;padding:20px 16px 12px;border:1px solid var(--line);border-radius:24px;
  background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.012))}
.graph-head{display:flex;align-items:center;justify-content:space-between;margin:0 4px 8px}
.graph-head h3{font-size:.76rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.legend{display:flex;gap:13px;font-size:.72rem;color:var(--muted)}
.legend i{display:inline-block;width:9px;height:9px;border-radius:3px;margin-right:6px;vertical-align:middle}
svg.chart{width:100%;height:auto;display:block}
svg.chart text{fill:var(--faint);font-family:'Space Grotesk';font-size:13px}
.empty{color:var(--faint);font-size:.84rem;text-align:center;padding:26px 0}

.cam-card{margin-top:18px;padding:16px 16px 14px;border:1px solid var(--line);border-radius:24px;
  background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.012));display:none}
.cam-frame{position:relative;border-radius:16px;overflow:hidden;border:1px solid var(--line);background:#0a0c16}
.cam-img{width:100%;display:block;aspect-ratio:16/9;object-fit:cover}
.cam-stamp{position:absolute;left:10px;bottom:9px;padding:4px 10px;border-radius:999px;
  background:rgba(5,6,13,.6);backdrop-filter:blur(4px);font-size:.72rem;color:#e9eefb;letter-spacing:.02em}
.foot{margin-top:22px;text-align:center;color:var(--faint);font-size:.76rem}
.foot b{color:var(--muted);font-weight:500}
.offbanner{display:none;margin:14px auto 0;max-width:420px;padding:9px 16px;border-radius:14px;
  background:rgba(255,157,60,.1);border:1px solid rgba(255,157,60,.3);color:#ffce8f;font-size:.82rem}
.offline .offbanner{display:block}
.offline .house{filter:drop-shadow(0 14px 22px rgba(0,0,0,.45)) grayscale(.55) brightness(.7)}
.offline .win{opacity:.3}
@media(prefers-reduced-motion:reduce){*{animation:none!important}}
</style>
</head>
<body>
<div class="sky"></div><div class="stars"></div>

<div class="app">
  <header class="head">
    <h1 class="title">Gr&aelig;rup</h1>
    <p class="tagline">Sommerhuset ved Vesterhavet</p>
  </header>

  <div class="hero" id="scene">
    <div class="stage">
      <div class="halo"></div>

      <svg class="sun" viewBox="0 0 60 60" aria-hidden="true">
        <g class="rays" stroke="#ffd35e" stroke-width="3" stroke-linecap="round">
          <line x1="30" y1="3" x2="30" y2="12"/><line x1="30" y1="48" x2="30" y2="57"/>
          <line x1="3" y1="30" x2="12" y2="30"/><line x1="48" y1="30" x2="57" y2="30"/>
          <line x1="10" y1="10" x2="16" y2="16"/><line x1="44" y1="44" x2="50" y2="50"/>
          <line x1="50" y1="10" x2="44" y2="16"/><line x1="16" y1="44" x2="10" y2="50"/>
        </g>
        <circle class="disc" cx="30" cy="30" r="13"/>
      </svg>
      <svg class="moon" viewBox="0 0 40 40" aria-hidden="true">
        <path d="M28 4a16 16 0 1 0 8 28A13 13 0 0 1 28 4Z" fill="#dfe6ff"/>
      </svg>

      <svg class="cloud c1" viewBox="0 0 90 40" aria-hidden="true"><path d="M22 34h44a13 13 0 0 0 1-26 17 17 0 0 0-32-3 12 12 0 0 0-13 13 11 11 0 0 0 0 16Z" fill="currentColor"/></svg>
      <svg class="cloud c2" viewBox="0 0 90 40" aria-hidden="true"><path d="M22 34h44a13 13 0 0 0 1-26 17 17 0 0 0-32-3 12 12 0 0 0-13 13 11 11 0 0 0 0 16Z" fill="currentColor"/></svg>

      <div class="fogband"></div>

      <!-- sommerhuset -->
      <svg class="house" viewBox="0 0 300 236" xmlns="http://www.w3.org/2000/svg" aria-label="Sommerhus">
        <defs>
          <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#3b4668"/><stop offset="1" stop-color="#2a3350"/></linearGradient>
          <linearGradient id="roof" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#6b4a5e"/><stop offset="1" stop-color="#4a3344"/></linearGradient>
          <radialGradient id="glow" cx="50%" cy="45%" r="60%"><stop offset="0" stop-color="#ffe9b0"/><stop offset="1" stop-color="#f4b24c"/></radialGradient>
          <linearGradient id="dune" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1d2740"/><stop offset="1" stop-color="#10182b"/></linearGradient>
        </defs>

        <!-- dune ground -->
        <path d="M0 196 Q80 178 150 190 Q230 202 300 184 L300 236 L0 236 Z" fill="url(#dune)"/>

        <!-- chimney smoke -->
        <g class="smoke"><circle cx="196" cy="74" r="6" fill="#c8d0e8"/><circle cx="196" cy="74" r="6" fill="#c8d0e8"/><circle cx="196" cy="74" r="6" fill="#c8d0e8"/></g>

        <!-- house body -->
        <rect x="78" y="108" width="144" height="92" rx="3" fill="url(#wall)"/>
        <!-- chimney -->
        <rect x="188" y="58" width="16" height="30" rx="2" fill="#4a3344"/>
        <!-- roof -->
        <path d="M66 112 L150 56 L234 112 Z" fill="url(#roof)"/>
        <path d="M66 112 L150 56 L234 112" fill="none" stroke="#7d5870" stroke-width="2" stroke-linecap="round"/>

        <!-- window with warm light -->
        <rect x="150" y="128" width="50" height="46" rx="3" fill="url(#glow)" class="win win-on"/>
        <g stroke="#2a3350" stroke-width="3"><line x1="175" y1="128" x2="175" y2="174"/><line x1="150" y1="151" x2="200" y2="151"/></g>
        <rect x="146" y="124" width="58" height="54" rx="4" fill="none" stroke="#202942" stroke-width="3"/>

        <!-- doorway: light behind, then swinging door -->
        <rect x="100" y="138" width="34" height="62" rx="2" fill="url(#glow)" class="doorlight"/>
        <g class="doorGroup">
          <rect x="100" y="138" width="34" height="62" rx="2" fill="#222b45"/>
          <rect x="100" y="138" width="34" height="62" rx="2" fill="none" stroke="#3a4668" stroke-width="2"/>
          <rect x="100" y="138" width="34" height="62" rx="2" fill="none" stroke="#161d31" stroke-width="2"/>
          <circle cx="128" cy="170" r="2.4" fill="var(--win)"/>
        </g>

        <!-- marram grass -->
        <g stroke="#5b6b54" stroke-width="2.4" stroke-linecap="round" fill="none">
          <path class="grass"    d="M40 198 Q42 182 38 172"/>
          <path class="grass g2" d="M46 198 Q50 184 54 174"/>
          <path class="grass g3" d="M52 199 Q53 186 49 178"/>
          <path class="grass g4" d="M258 196 Q260 182 256 173"/>
          <path class="grass g2" d="M264 196 Q268 184 272 175"/>
          <path class="grass g3" d="M270 197 Q271 185 267 178"/>
        </g>
      </svg>

      <div class="weatherfx" id="fx"></div>
      <div class="flash"></div>
    </div>

    <div class="temp" id="temp">–<span class="deg">&deg;</span></div>
    <div class="sub" id="sub">henter data…</div>

    <div class="timer">
      <span class="dot"></span>
      <b id="doorState">Døren</b>
      <small id="doorSince"></small>
    </div>
  </div>

  <div class="offbanner" id="offbanner">Ingen forbindelse til sommerhusets sensorer</div>

  <div class="cam-card" id="camCard">
    <div class="graph-head">
      <h3>Morgenbillede fra huset</h3>
    </div>
    <div class="cam-frame">
      <img class="cam-img" id="camImg" alt="Webcam fra Grærup">
      <div class="cam-stamp" id="camStamp"></div>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="v" id="humStat">–</div><div class="l">fugt inde</div></div>
    <div class="stat"><div class="v" id="outStat">–</div><div class="l">ude lige nu</div></div>
    <div class="stat"><div class="v" id="opensStat">–</div><div class="l">døråbninger i dag</div></div>
  </div>

  <div class="fcwrap">
    <div class="fchead">
      <h3>Vejret i Grærup</h3>
      <div class="fcnow" id="fcnow"></div>
    </div>
    <div class="fcrow" id="fcrow"></div>
  </div>

  <div class="graph-card">
    <div class="graph-head">
      <h3>Temperatur &amp; fugt · i dag</h3>
      <div class="legend"><span><i style="background:var(--warm)"></i>Temp</span><span><i style="background:var(--cool)"></i>Fugt</span></div>
    </div>
    <svg class="chart" id="climate" viewBox="0 0 1000 280" preserveAspectRatio="none"></svg>
    <div class="empty" id="climateEmpty" style="display:none">Ingen målinger logget i dag endnu</div>
  </div>

  <div class="graph-card">
    <div class="graph-head">
      <h3>Døren</h3>
      <div class="legend"><span id="todayLegend"></span></div>
    </div>
    <svg class="chart" id="doors" viewBox="0 0 1000 300" preserveAspectRatio="none"></svg>
  </div>

  <div class="foot">Opdateret <b id="updated">—</b> · Home&nbsp;Assistant</div>
</div>

<script>
/* =================== DATA — Home Assistant udfylder KUN dette ===========
   Se README i gist'en. online=false => sensorerne svarer ikke (huset offline).
   tempSeries / humSeries : timeprøver, index = klokketime (0..23), null = hul.
   doorTimes : ["08.13","12.12"] åbningstidspunkter i dag.
   weekDoor  : 7 tal, sidste = i dag.
   weather.forecast : op til 5 dage [{day,cond,hi,lo,pop}].
   ====================================================================== */
const FALLBACK = {
  updated:"2026-06-25T16:33:00+02:00", online:false, lastSeen:"2026-06-20T13:00:00+02:00",
  temp:null, tempLiving:null, humidity:null, humidityLiving:null,
  door:"unknown", doorSince:"2026-06-20T13:00:00+02:00", doorLastOpen:null, doorOpensToday:0,
  webcamTime:null,
  tempSeries:[], humSeries:[], doorTimes:[], weekDoor:[0,0,0,0,0,0,0],
  weather:{now:"sunny",tempOut:19.6,humidityOut:74,wind:20.5,forecast:[
    {day:"tor",cond:"sunny",hi:20,lo:17,pop:0},{day:"fre",cond:"sunny",hi:32,lo:13,pop:0},
    {day:"lør",cond:"sunny",hi:26,lo:22,pop:18},{day:"søn",cond:"partlycloudy",hi:24,lo:21,pop:72},
    {day:"man",cond:"sunny",hi:21,lo:18,pop:14}]}
};

const M=["jan","feb","mar","apr","maj","jun","jul","aug","sep","okt","nov","dec"];
const DAYS=["søn","man","tir","ons","tor","fre","lør"];
const p=n=>String(n).padStart(2,"0");
const clock=d=>p(d.getHours())+"."+p(d.getMinutes());
const num=(v,d=1)=>v==null?"–":(Math.round(v*Math.pow(10,d))/Math.pow(10,d)).toString().replace(".",",");

/* condition -> scene class + icon key */
function sceneOf(cond,night){
  const c=(cond||"").toLowerCase();
  if(c.includes("light")||c.includes("storm")) return "storm";
  if(c.includes("pour")||c.includes("rain")||c.includes("hail")) return "rain";
  if(c.includes("snow")) return "snow";
  if(c.includes("fog")) return "fog";
  if(c.includes("cloud")&&c.includes("partly")) return "partly";
  if(c.includes("cloud")) return "cloudy";
  if(c.includes("clear")&&night) return "night";
  if(c.includes("wind")) return "windy";
  return night?"night":"sunny";
}
function wIcon(cond){
  const c=(cond||"").toLowerCase();
  const sun='<circle cx="15" cy="15" r="7" fill="#ffd35e"/><g stroke="#ffd35e" stroke-width="2" stroke-linecap="round"><line x1="15" y1="2" x2="15" y2="6"/><line x1="15" y1="24" x2="15" y2="28"/><line x1="2" y1="15" x2="6" y2="15"/><line x1="24" y1="15" x2="28" y2="15"/><line x1="6" y1="6" x2="9" y2="9"/><line x1="21" y1="21" x2="24" y2="24"/><line x1="24" y1="6" x2="21" y2="9"/><line x1="9" y1="21" x2="6" y2="24"/></g>';
  const cloud='<path d="M9 23h13a6 6 0 0 0 1-12 8 8 0 0 0-15-1 5.5 5.5 0 0 0-6 6 5 5 0 0 0 6 7Z" fill="#aab4d4"/>';
  const rain=cloud+'<g stroke="#6db3ff" stroke-width="2" stroke-linecap="round"><line x1="11" y1="25" x2="9" y2="29"/><line x1="17" y1="25" x2="15" y2="29"/><line x1="23" y1="25" x2="21" y2="29"/></g>';
  const snow=cloud+'<g fill="#dcebff"><circle cx="11" cy="27" r="1.5"/><circle cx="18" cy="28" r="1.5"/><circle cx="24" cy="26" r="1.5"/></g>';
  const partly='<circle cx="11" cy="12" r="5.5" fill="#ffd35e"/><path d="M12 25h11a5.5 5.5 0 0 0 1-11 7 7 0 0 0-13-1 5 5 0 0 0-5 5 4.5 4.5 0 0 0 6 8Z" fill="#aab4d4"/>';
  const storm=cloud+'<path d="M16 24l-4 6h4l-2 5 7-8h-4l3-3Z" fill="#ffd24a"/>';
  const fog=cloud+'<g stroke="#cfd8ee" stroke-width="2" stroke-linecap="round"><line x1="8" y1="26" x2="22" y2="26"/><line x1="10" y1="29" x2="24" y2="29"/></g>';
  if(c.includes("light")||c.includes("storm"))return storm;
  if(c.includes("pour")||c.includes("rain")||c.includes("hail"))return rain;
  if(c.includes("snow"))return snow;
  if(c.includes("fog"))return fog;
  if(c.includes("partly"))return partly;
  if(c.includes("cloud"))return cloud;
  return sun;
}

let TIMERS=[];
function clearTimers(){TIMERS.forEach(clearInterval);TIMERS=[];}

function render(DATA){
  clearTimers();
  const body=document.getElementById("scene");
  const root=document.body;
  const upd=new Date(DATA.updated);

  /* tidspunkt på dagen ud fra solens højde (falder tilbage til uret) */
  const sun=DATA.sun||{};
  let elev=sun.elevation;
  if(elev==null){const hr=new Date().getHours();elev=(hr>=8&&hr<18)?25:((hr>=6&&hr<8)||(hr>=18&&hr<20))?2:-20;}
  const phase=elev>=8?"day":elev>=0?"golden":elev>=-9?"twilight":"night";
  document.body.setAttribute("data-phase",phase);
  const night=elev<0;
  // sol-position efter højde
  const sunEl=document.querySelector(".sun");
  if(sunEl){const tp=Math.round(150-Math.max(0,Math.min(50,elev))/50*130);sunEl.style.top=tp+"px";}

  /* accent farve efter temperatur (inde hvis online, ellers ude) */
  let acc="--warm",glow="--warm-glow",soft="--warm-soft";
  const t=DATA.temp;
  const accTemp=(t!=null)?t:(DATA.weather&&DATA.weather.tempOut);
  if(accTemp!=null&&accTemp<10){acc="--cool";glow="--cool-glow";soft="--cool-soft";}
  document.documentElement.style.setProperty("--accent",`var(${acc})`);
  document.documentElement.style.setProperty("--accent-glow",`var(${glow})`);
  document.documentElement.style.setProperty("--accent-soft",`var(${soft})`);

  /* scene klasser */
  root.className="";
  const scene=sceneOf(DATA.weather&&DATA.weather.now,night);
  root.classList.add(scene);
  if(t!=null&&t>=18)root.classList.add("warm");
  else if(t!=null&&t>=11)root.classList.add("mild");
  if(DATA.door==="open")root.classList.add("door-open");
  if(!DATA.online)root.classList.add("offline");

  /* central temperatur — inde når online, ellers falder tilbage til ude */
  const tempEl=document.getElementById("temp");
  const sub=document.getElementById("sub");
  const liveInside=DATA.online&&t!=null;
  const bigVal=liveInside?t:DATA.weather.tempOut;
  tempEl.innerHTML=num(bigVal,1)+'<span class="deg">&deg;</span>';
  if(liveInside){
    let bits=[];
    if(DATA.tempLiving!=null)bits.push("stue "+num(DATA.tempLiving,1)+"°");
    bits.push("ude "+num(DATA.weather.tempOut,1)+"°");
    sub.textContent=bits.join("  ·  ");
  }else{
    const ls=new Date(DATA.lastSeen);
    sub.textContent="ude lige nu · sidst set inde "+p(ls.getDate())+". "+M[ls.getMonth()];
  }

  /* dør status + live tæller */
  const open=DATA.door==="open";
  const ds=document.getElementById("doorState");
  const since=new Date(DATA.doorSince);
  ds.textContent=DATA.door==="unknown"?"Døren — ukendt":(open?"Døren er åben":"Døren er lukket");
  function tick(){
    let s=Math.max(0,Math.floor((Date.now()-since.getTime())/1000));
    const h=Math.floor(s/3600);s%=3600;const m=Math.floor(s/60);
    const txt=(open?"åben i ":"lukket i ")+(h?h+"t ":"")+m+"m";
    document.getElementById("doorSince").textContent=DATA.door==="unknown"?"":txt;
  }
  tick();TIMERS.push(setInterval(tick,1000));

  /* stats */
  document.getElementById("humStat").textContent=DATA.online&&DATA.humidity!=null?num(DATA.humidity,0)+"%":"–";
  document.getElementById("outStat").textContent=num(DATA.weather.tempOut,1)+"°";
  document.getElementById("opensStat").textContent=DATA.doorOpensToday!=null?DATA.doorOpensToday:"–";

  /* updated */
  document.getElementById("updated").textContent=p(upd.getDate())+". "+M[upd.getMonth()]+". kl. "+clock(upd);

  /* dør sidst åbnet i legend */
  const tl=document.getElementById("todayLegend");
  tl.textContent=DATA.doorLastOpen?("sidst åbnet kl. "+DATA.doorLastOpen):"ingen åbninger i dag";

  buildFx(scene);
  buildForecast(DATA.weather);
  buildClimate(DATA);
  buildDoors(DATA);

  /* morgenbillede-tekst */
  document.getElementById("camStamp").textContent="Solopgang ved huset";
}

/* regndråber / snefnug partikler */
function buildFx(scene){
  const fx=document.getElementById("fx");fx.innerHTML="";
  if(scene==="rain"||scene==="storm"){
    for(let i=0;i<28;i++){
      const d=document.createElement("div");d.className="drop";
      d.style.left=(Math.random()*100)+"%";
      d.style.animationDuration=(0.5+Math.random()*0.45)+"s";
      d.style.animationDelay=(Math.random()*1.2)+"s";
      fx.appendChild(d);
    }
  }else if(scene==="snow"){
    for(let i=0;i<22;i++){
      const f=document.createElement("div");f.className="flake";f.textContent="❄";
      f.style.left=(Math.random()*100)+"%";
      f.style.fontSize=(9+Math.random()*8)+"px";
      f.style.animationDuration=(3+Math.random()*3)+"s";
      f.style.animationDelay=(Math.random()*3)+"s";
      fx.appendChild(f);
    }
  }
}

function buildForecast(w){
  document.getElementById("fcnow").innerHTML=
    'Lige nu <b>'+num(w.tempOut,1)+'°</b> · vind '+num(w.wind,0)+' km/t · fugt '+num(w.humidityOut,0)+'%';
  const row=document.getElementById("fcrow");row.innerHTML="";
  (w.forecast||[]).slice(0,5).forEach(f=>{
    const el=document.createElement("div");el.className="fcday";
    el.innerHTML='<div class="d">'+f.day+'</div>'+
      '<svg viewBox="0 0 30 32" aria-hidden="true">'+wIcon(f.cond)+'</svg>'+
      '<div class="hi">'+num(f.hi,0)+'°</div>'+
      '<div class="lo">'+num(f.lo,0)+'°</div>'+
      (f.pop>10?'<div class="pop">'+f.pop+'%</div>':'<div class="pop">&nbsp;</div>');
    row.appendChild(el);
  });
}

/* bespoke temp+fugt kurve */
function buildClimate(DATA){
  const svg=document.getElementById("climate");
  const empty=document.getElementById("climateEmpty");
  const ts=DATA.tempSeries||[],hs=DATA.humSeries||[];
  const tPts=ts.map((v,i)=>v==null?null:[i,v]).filter(Boolean);
  const hPts=hs.map((v,i)=>v==null?null:[i,v]).filter(Boolean);
  if(tPts.length<1&&hPts.length<1){svg.style.display="none";empty.style.display="block";return;}
  svg.style.display="block";empty.style.display="none";
  const W=1000,H=280,padL=20,padR=20,top=24,bottom=232;
  const span=Math.max((ts.length||hs.length||1)-1,1);
  const X=i=>padL+(W-padL-padR)*(i/span);
  // temp skala
  const tv=tPts.map(p=>p[1]);
  let tmin=Math.min(...tv),tmax=Math.max(...tv);
  if(!isFinite(tmin)){tmin=0;tmax=1;}
  if(tmax-tmin<2){tmax+=1;tmin-=1;}
  const tpad=(tmax-tmin)*0.15;tmin-=tpad;tmax+=tpad;
  const TY=v=>bottom-(bottom-top)*((v-tmin)/(tmax-tmin));
  const HY=v=>bottom-(bottom-top)*(v/100); // fugt 0-100
  let defs='<defs><linearGradient id="tg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="var(--warm)" stop-opacity=".5"/><stop offset="1" stop-color="var(--warm)" stop-opacity=".03"/></linearGradient></defs>';
  // grid + akse-labels (hver 6. time)
  let grid="";
  for(let h=0;h<ts.length;h+=6){grid+='<line x1="'+X(h)+'" y1="'+top+'" x2="'+X(h)+'" y2="'+bottom+'" stroke="var(--line)"/>'+
    '<text x="'+X(h)+'" y="'+(bottom+24)+'" text-anchor="middle">'+p(h)+'</text>';}
  grid+='<line x1="'+padL+'" y1="'+bottom+'" x2="'+(W-padR)+'" y2="'+bottom+'" stroke="var(--line)"/>';
  // temp areal + linje
  let tArea="",tLine="";
  if(tPts.length){
    const seg=tPts.map(pp=>[X(pp[0]),TY(pp[1])]);
    tLine=seg.map((s,i)=>(i?"L":"M")+s[0]+" "+s[1]).join(" ");
    tArea="M"+seg[0][0]+" "+bottom+" "+seg.map(s=>"L"+s[0]+" "+s[1]).join(" ")+" L"+seg[seg.length-1][0]+" "+bottom+" Z";
  }
  let hLine="";
  if(hPts.length){
    const seg=hPts.map(pp=>[X(pp[0]),HY(pp[1])]);
    hLine=seg.map((s,i)=>(i?"L":"M")+s[0]+" "+s[1]).join(" ");
  }
  // min/max temp markører
  let marks="";
  if(tPts.length){
    const hi=tPts.reduce((a,b)=>b[1]>a[1]?b:a),lo=tPts.reduce((a,b)=>b[1]<a[1]?b:a);
    marks='<circle cx="'+X(hi[0])+'" cy="'+TY(hi[1])+'" r="4" fill="var(--warm)"/>'+
      '<text x="'+X(hi[0])+'" y="'+(TY(hi[1])-10)+'" text-anchor="middle" fill="var(--txt)">'+num(hi[1],1)+'°</text>'+
      '<circle cx="'+X(lo[0])+'" cy="'+TY(lo[1])+'" r="4" fill="var(--cool)"/>'+
      '<text x="'+X(lo[0])+'" y="'+(TY(lo[1])+20)+'" text-anchor="middle" fill="var(--txt)">'+num(lo[1],1)+'°</text>';
  }
  svg.innerHTML=defs+grid+
    (tArea?'<path d="'+tArea+'" fill="url(#tg)"/>':"")+
    (hLine?'<path d="'+hLine+'" fill="none" stroke="var(--cool)" stroke-width="3" stroke-dasharray="2 6" stroke-linecap="round" opacity=".85"/>':"")+
    (tLine?'<path d="'+tLine+'" fill="none" stroke="var(--warm)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>':"")+
    marks;
}

/* dør: i dag-tidslinje (prikker) + 7-dages søjler */
function buildDoors(DATA){
  const svg=document.getElementById("doors");
  const W=1000,H=300;
  const times=DATA.doorTimes||[];
  const week=DATA.weekDoor||[];
  // tidslinje øverst
  const tlY=54,tlL=40,tlR=40;
  const TX=mins=>tlL+(W-tlL-tlR)*(mins/1440);
  let timeline='<text x="'+tlL+'" y="28" fill="var(--muted)">I dag</text>'+
    '<line x1="'+tlL+'" y1="'+tlY+'" x2="'+(W-tlR)+'" y2="'+tlY+'" stroke="var(--line)"/>';
  for(let h=0;h<=24;h+=6){timeline+='<line x1="'+TX(h*60)+'" y1="'+(tlY-5)+'" x2="'+TX(h*60)+'" y2="'+(tlY+5)+'" stroke="var(--faint)"/>'+
    '<text x="'+TX(h*60)+'" y="'+(tlY+24)+'" text-anchor="middle">'+p(h)+'</text>';}
  times.forEach(t=>{
    const m=t.split(".");const mins=(+m[0])*60+(+(m[1]||0));
    timeline+='<circle cx="'+TX(mins)+'" cy="'+tlY+'" r="6" fill="var(--open)"><title>'+t+'</title></circle>'+
      '<circle cx="'+TX(mins)+'" cy="'+tlY+'" r="11" fill="none" stroke="var(--open)" stroke-opacity=".35"/>';
  });
  if(!times.length)timeline+='<text x="'+(W/2)+'" y="'+(tlY-14)+'" text-anchor="middle" fill="var(--faint)">ingen åbninger endnu</text>';

  // 7-dages søjler nederst
  const base=120,bH=148,bBottom=base+bH;
  const n=week.length||7;
  const today=new Date(DATA.updated);
  const maxV=Math.max(1,...week);
  const bw=(W-tlL-tlR)/n*0.56;
  const gx=i=>tlL+(W-tlL-tlR)*((i+0.5)/n);
  let bars='<text x="'+tlL+'" y="'+(base-14)+'" fill="var(--muted)">Åbninger pr. dag · 7 dage</text>';
  for(let i=0;i<n;i++){
    const v=week[i]||0;
    const hgt=bH*(v/maxV);
    const x=gx(i)-bw/2,y=bBottom-hgt;
    const isToday=i===n-1;
    bars+='<rect x="'+x+'" y="'+y+'" width="'+bw+'" height="'+Math.max(hgt,2)+'" rx="5" fill="'+(isToday?"var(--open)":"var(--shut)")+'" opacity="'+(isToday?1:.7)+'"/>';
    if(v>0)bars+='<text x="'+gx(i)+'" y="'+(y-8)+'" text-anchor="middle" fill="var(--txt)">'+v+'</text>';
    const d=new Date(today);d.setDate(d.getDate()-(n-1-i));
    const lbl=isToday?"i dag":DAYS[d.getDay()];
    bars+='<text x="'+gx(i)+'" y="'+(bBottom+24)+'" text-anchor="middle">'+lbl+'</text>';
  }
  bars+='<line x1="'+tlL+'" y1="'+bBottom+'" x2="'+(W-tlR)+'" y2="'+bBottom+'" stroke="var(--line)"/>';
  svg.innerHTML=timeline+bars;
}

/* ====== Grærups egen datafil: en GitHub Gist, som Home Assistant opdaterer
   ved hver hændelse (dør/temp/fugt) + hvert 5. min + ved HA-genstart.
   Helt uafhængig af den gamle index.html (som derfor trygt kan slettes).
   Tjekker hvert 30. sekund og gentegner kun ved ændring. ================= */
const DATA_URL="https://gist.githubusercontent.com/henrikastrup/5c94bc3bb851305bab61db0f9e37b110/raw/graerup_seed.json";
let lastSig=null;
async function loadData(){
  try{
    const r=await fetch(DATA_URL+"?t="+Date.now(),{cache:"no-store"});
    if(!r.ok)throw 0;
    const d=await r.json();
    const sig=JSON.stringify(d);
    if(sig!==lastSig){lastSig=sig;render(Object.assign({},FALLBACK,d));}
  }catch(e){
    if(!lastSig){lastSig="fallback";render(FALLBACK);}
  }
}
loadData();
setInterval(loadData,30000);

/* morgenbillede: dagligt solopgangs-snapshot fra sommerhusets kamera,
   serveret direkte af Home Assistant (/local kræver ikke login, og et <img>
   kræver ikke CORS). Opdateres af automation.solopgang_foto_graerup_dagligt. */
const CAM_URL="https://ha.xmemory.com/local/snapshots/solopgang-vest.jpg";
function loadCam(){
  const img=document.getElementById("camImg");
  img.onload=()=>{document.getElementById("camCard").style.display="block";};
  img.onerror=()=>{document.getElementById("camCard").style.display="none";};
  img.src=CAM_URL+"?t="+Date.now();
}
loadCam();
setInterval(loadCam,1800000);
